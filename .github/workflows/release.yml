# Immutable Kimen candidate validation and trusted npm publication.
# A manual dispatch is validation-only. Only a vX.Y.Z tag can enter release
# mode, and build-candidate verifies that it points at protected main.
name: release

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*.*.*'

permissions: {}

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  validate-core:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
    outputs:
      artifact-id: ${{ steps.upload.outputs.artifact-id }}
      artifact-digest: ${{ steps.upload.outputs.artifact-digest }}
      candidate-sha256: ${{ steps.candidate.outputs.candidate-sha256 }}
      mode: ${{ steps.candidate.outputs.mode }}
      source-sha: ${{ steps.candidate.outputs.source-sha }}
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2
        with:
          egress-policy: block
          allowed-endpoints: >-
            github.com:443
            api.github.com:443
            objects.githubusercontent.com:443
            *.actions.githubusercontent.com:443
            *.blob.core.windows.net:443
            registry.npmjs.org:443
            cdn.playwright.dev:443
            playwright.azureedge.net:443
            playwright.download.prss.microsoft.com:443
            packages.microsoft.com:443
            dl.google.com:443
            azure.archive.ubuntu.com:80
            archive.ubuntu.com:443
            security.ubuntu.com:443

      - name: Check out exact candidate source
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Allocate isolated writable caches
        run: bash scripts/gates/cache-env.sh --github-env "$GITHUB_ENV"

      - name: Install pnpm
        uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4

      - name: Install Node.js
        uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
        with:
          node-version: 22
          cache: pnpm

      - name: Install frozen dependencies
        run: pnpm install --frozen-lockfile

      - name: Prepare Chromium for core consumer validation
        run: pnpm --filter @kimen/elements exec playwright install --with-deps chromium

      - name: Validate deterministic core
        run: bash scripts/gates/gates-core.sh

      - name: Build exact immutable candidate
        id: candidate
        shell: bash
        run: |
          set -euo pipefail
          mode='dry-run'
          tag_arguments=()
          if [[ "$GITHUB_REF_TYPE" == 'tag' ]]; then
            mode='release'
            tag_arguments=(--tag "$GITHUB_REF_NAME")
            git update-ref refs/heads/main "$(git rev-parse refs/remotes/origin/main)"
          fi
          result="$RUNNER_TEMP/candidate-result.json"
          node scripts/release/candidate-cli.mjs build \
            --mode "$mode" \
            --repository-root "$GITHUB_WORKSPACE" \
            --output-directory "$RUNNER_TEMP/release-candidate" \
            --source-sha "$GITHUB_SHA" \
            "${tag_arguments[@]}" >"$result"
          candidate_sha="$(node -e "const fs=require('node:fs');process.stdout.write(JSON.parse(fs.readFileSync(process.argv[1],'utf8')).candidateSha256)" "$result")"
          printf 'candidate-sha256=%s\nmode=%s\nsource-sha=%s\n' \
            "$candidate_sha" "$mode" "$GITHUB_SHA" >>"$GITHUB_OUTPUT"

      - name: Upload immutable candidate
        id: upload
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: release-candidate
          path: ${{ runner.temp }}/release-candidate/candidate.tar
          if-no-files-found: error
          compression-level: 0
          overwrite: false
          retention-days: 7

  browser:
    needs: validate-core
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        engine: [chromium, firefox, webkit]
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2
        with:
          egress-policy: block
          allowed-endpoints: >-
            github.com:443
            api.github.com:443
            objects.githubusercontent.com:443
            *.actions.githubusercontent.com:443
            *.blob.core.windows.net:443
            registry.npmjs.org:443
            cdn.playwright.dev:443
            playwright.azureedge.net:443
            playwright.download.prss.microsoft.com:443
            packages.microsoft.com:443
            dl.google.com:443
            azure.archive.ubuntu.com:80
            archive.ubuntu.com:443
            security.ubuntu.com:443

      - name: Check out validation harness at candidate SHA
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          ref: ${{ needs.validate-core.outputs.source-sha }}
          persist-credentials: false

      - name: Allocate isolated writable caches
        run: bash scripts/gates/cache-env.sh --github-env "$GITHUB_ENV"

      - name: Install pnpm
        uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4

      - name: Install Node.js
        uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
        with:
          node-version: 22
          cache: pnpm

      - name: Install frozen validation harness
        run: pnpm install --frozen-lockfile

      - name: Install exact browser engine
        run: pnpm --filter @kimen/elements exec playwright install --with-deps "${{ matrix.engine }}"

      - name: Run complete browser gate
        run: bash scripts/gates/gates-browser.sh "${{ matrix.engine }}"

      - name: Download candidate by immutable artifact ID
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          artifact-ids: ${{ needs.validate-core.outputs.artifact-id }}
          path: ${{ runner.temp }}/downloaded-candidate

      - name: Verify and test exact candidate tarballs
        env:
          KIMEN_BROWSER_ENGINE: ${{ matrix.engine }}
        shell: bash
        run: |
          set -euo pipefail
          archive="$RUNNER_TEMP/downloaded-candidate/candidate.tar"
          verification="$RUNNER_TEMP/candidate-verification.json"
          node scripts/release/candidate-cli.mjs verify \
            --archive "$archive" \
            --sha256 "${{ needs.validate-core.outputs.candidate-sha256 }}" >"$verification"
          version="$(node -e "const fs=require('node:fs');process.stdout.write(JSON.parse(fs.readFileSync(process.argv[1],'utf8')).manifest.version)" "$verification")"
          content="$RUNNER_TEMP/candidate-content"
          metadata="$RUNNER_TEMP/elements-metadata"
          consumer_cache="$RUNNER_TEMP/consumer-cache"
          mkdir -p "$content" "$metadata" "$consumer_cache/npm" "$consumer_cache/pnpm-store" "$consumer_cache/pnpm-prime" "$consumer_cache/xdg"
          tar -xf "$archive" -C "$content"
          tar -xzf "$content/kimen-elements-$version.tgz" -C "$metadata" package/llms.txt
          npm cache add --cache "$consumer_cache/npm" @stencil/core@4.43.5
          node -e "require('node:fs').writeFileSync(process.argv[1], '{\"name\":\"kimen-pnpm-prime\",\"private\":true}\n')" \
            "$consumer_cache/pnpm-prime/package.json"
          XDG_CACHE_HOME="$consumer_cache/xdg" pnpm --dir "$consumer_cache/pnpm-prime" --store-dir "$consumer_cache/pnpm-store" add --ignore-scripts --save-exact @stencil/core@4.43.5
          NPM_CONFIG_OFFLINE=true npm_config_offline=true node scripts/consumer-contract.mjs \
            --elements-tarball "$content/kimen-elements-$version.tgz" \
            --tokens-tarball "$content/kimen-tokens-$version.tgz" \
            --llms "$metadata/package/llms.txt" \
            --consumer-dir "$RUNNER_TEMP/kimen-consumer" \
            --cache-dir "$consumer_cache" \
            --report "$RUNNER_TEMP/browser-${{ matrix.engine }}.json"
          node --input-type=module --eval '
            import { readFileSync } from "node:fs";
            const report = JSON.parse(readFileSync(process.argv[1], "utf8"));
            const expectedEngine = process.argv[2];
            const expectedPackages = ["@kimen/elements", "@kimen/tokens"];
            const browser = report.browser;
            const installationEvidence =
              Array.isArray(report.installationExamples) &&
              report.installationExamples.length > 0 &&
              Array.isArray(report.installationRuns) &&
              report.installationRuns.length === report.installationExamples.length &&
              report.installationRuns.every(
                (run, index) =>
                  run.command === report.installationExamples[index].command &&
                  run.status === "passed" &&
                  ["npm", "pnpm"].includes(run.manager),
              );
            const packageEvidence =
              Array.isArray(report.packages) &&
              report.packages.length === expectedPackages.length &&
              !report.packages.some(
                ({ name, source, workspaceLinked }, index) =>
                  name !== expectedPackages[index] ||
                  source !== "tarball" ||
                  workspaceLinked !== false,
              );
            const snippetEvidence =
              Array.isArray(report.snippets) &&
              report.snippets.length > 0 &&
              report.snippets.every(
                ({ language, status }) =>
                  ["js", "ts"].includes(language) && status === "passed",
              );
            if (
              report.schemaVersion !== 1 ||
              !installationEvidence ||
              !packageEvidence ||
              !snippetEvidence ||
              browser?.engine !== expectedEngine ||
              browser.tagName !== "ki-button" ||
              browser.customElementDefined !== true ||
              browser.shadowButtonRendered !== true ||
              browser.executedSnippetCount !== report.snippets.length ||
              browser.httpRequestPolicyEnforced !== true ||
              JSON.stringify(browser.networkPolicyScope) !==
                JSON.stringify(["http(s)-requests", "websocket"]) ||
              browser.themeCustomPropertiesResolved !== true ||
              browser.themeResolved !== true ||
              browser.themeTokenOverrideResolved !== true ||
              browser.webSocketPolicyEnforced !== true
            ) {
              throw new Error(`consumer evidence incomplete: ${JSON.stringify(report)}`);
            }
          ' "$RUNNER_TEMP/browser-${{ matrix.engine }}.json" "${{ matrix.engine }}"

  verify-candidate:
    needs: validate-core
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2
        with:
          egress-policy: block
          allowed-endpoints: >-
            github.com:443
            api.github.com:443
            objects.githubusercontent.com:443
            *.actions.githubusercontent.com:443
            *.blob.core.windows.net:443

      - name: Check out verifier at candidate SHA
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          ref: ${{ needs.validate-core.outputs.source-sha }}
          persist-credentials: false

      - name: Download candidate by immutable artifact ID
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          artifact-ids: ${{ needs.validate-core.outputs.artifact-id }}
          path: ${{ runner.temp }}/downloaded-candidate

      - name: Independently verify candidate without OIDC
        run: >-
          node scripts/release/candidate-cli.mjs verify
          --archive "$RUNNER_TEMP/downloaded-candidate/candidate.tar"
          --sha256 "${{ needs.validate-core.outputs.candidate-sha256 }}"

  publish:
    needs: [validate-core, verify-candidate, browser]
    if: needs.validate-core.outputs.mode == 'release'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment:
      name: npm
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2
        with:
          egress-policy: block
          allowed-endpoints: >-
            api.github.com:443
            *.actions.githubusercontent.com:443
            *.blob.core.windows.net:443
            registry.npmjs.org:443

      - name: Download validated candidate by artifact ID
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          artifact-ids: ${{ needs.validate-core.outputs.artifact-id }}
          path: ${{ runner.temp }}/downloaded-candidate

      # No checkout, dependency install, build, versioning or repository script
      # is permitted below. Only runner tools inspect and publish exact bytes.
      - name: Verify bytes and publish only missing identical versions
        env:
          CANDIDATE_SHA256: ${{ needs.validate-core.outputs.candidate-sha256 }}
          CANDIDATE_SOURCE_SHA: ${{ needs.validate-core.outputs.source-sha }}
        shell: bash
        run: |
          set -euo pipefail
          [[ -z "${NODE_AUTH_TOKEN:-}" && -z "${NPM_TOKEN:-}" ]] || {
            echo 'Long-lived npm credentials are forbidden' >&2
            exit 1
          }
          npm_version="$(npm --version)"
          IFS=. read -r npm_major npm_minor npm_patch <<<"$npm_version"
          if (( npm_major < 11 || (npm_major == 11 && npm_minor < 5) || (npm_major == 11 && npm_minor == 5 && npm_patch < 1) )); then
            echo "Trusted publication requires preinstalled npm >=11.5.1; found $npm_version" >&2
            exit 1
          fi

          archive="$RUNNER_TEMP/downloaded-candidate/candidate.tar"
          printf '%s  %s\n' "$CANDIDATE_SHA256" "$archive" | sha256sum --check --status
          content="$RUNNER_TEMP/publish-candidate"
          mkdir -p "$content"
          tar -xf "$archive" -C "$content"
          (cd "$content" && sha256sum --check --strict SHA256SUMS)

          node --input-type=module --eval '
            import { readFileSync } from "node:fs";
            import { createHash } from "node:crypto";
            import { join } from "node:path";
            const root = process.argv[1];
            const manifest = JSON.parse(readFileSync(join(root, "manifest.json"), "utf8"));
            const expected = ["@kimen/elements", "@kimen/tokens"];
            if (manifest.mode !== "release" || manifest.sourceSha !== process.env.CANDIDATE_SOURCE_SHA || manifest.tag !== process.env.GITHUB_REF_NAME || manifest.tag !== `v${manifest.version}`) throw new Error("release manifest binding mismatch");
            if (manifest.packages.length !== 2 || manifest.packages.some((entry, index) => entry.name !== expected[index])) throw new Error("release package set mismatch");
            for (const entry of manifest.packages) {
              const bytes = readFileSync(join(root, entry.file));
              const sha256 = createHash("sha256").update(bytes).digest("hex");
              const integrity = `sha512-${createHash("sha512").update(bytes).digest("base64")}`;
              if (sha256 !== entry.sha256 || integrity !== entry.integrity || bytes.length !== entry.size) throw new Error(`${entry.name} release digest mismatch`);
              process.stdout.write(`${entry.name}\t${entry.file}\t${entry.integrity}\t${manifest.version}\n`);
            }
          ' "$content" >"$RUNNER_TEMP/publish-plan.tsv"

          while IFS=$'\t' read -r package_name package_file package_integrity package_version; do
            package_path="$content/$package_file"
            packed_manifest="$RUNNER_TEMP/packed-package.json"
            tar -xOzf "$package_path" package/package.json >"$packed_manifest"
            EXPECTED_NAME="$package_name" EXPECTED_VERSION="$package_version" node --input-type=module --eval '
              import { readFileSync } from "node:fs";
              const manifest = JSON.parse(readFileSync(process.argv[1], "utf8"));
              const repository = manifest.repository;
              const forbidden = ["prepack", "postpack", "prepare", "prepublish", "prepublishOnly", "publish", "postpublish"];
              if (manifest.name !== process.env.EXPECTED_NAME || manifest.version !== process.env.EXPECTED_VERSION || manifest.private !== false) throw new Error("packed release metadata mismatch");
              if (repository?.type !== "git" || repository?.url !== "git+https://github.com/kimen-dev/kimen.git") throw new Error("packed repository metadata mismatch");
              if (forbidden.some((name) => Object.hasOwn(manifest.scripts ?? {}, name))) throw new Error("publish lifecycle scripts are forbidden");
            ' "$packed_manifest"

            npm view "$package_name" name --json >/dev/null || {
              echo "First publication for $package_name is blocked until the package and trusted publisher exist" >&2
              exit 1
            }
            error_file="$RUNNER_TEMP/npm-view-error.log"
            if existing="$(npm view "$package_name@$package_version" dist.integrity --json 2>"$error_file")"; then
              existing="$(node -e "const fs=require('node:fs');process.stdout.write(String(JSON.parse(fs.readFileSync(0,'utf8'))))" <<<"$existing")"
              [[ "$existing" == "$package_integrity" ]] || {
                echo "Registry integrity conflict for $package_name@$package_version" >&2
                exit 1
              }
              echo "Already published with identical integrity: $package_name@$package_version"
            elif grep -q 'E404' "$error_file"; then
              npm publish "$package_path" --access public --ignore-scripts --provenance
            else
              sed 's/.*token.*/[redacted npm diagnostic]/I' "$error_file" >&2
              exit 1
            fi
          done <"$RUNNER_TEMP/publish-plan.tsv"
