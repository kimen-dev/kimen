name: break-glass

on:
  pull_request_target:
    types: [opened, edited, labeled, reopened, synchronize]

permissions: {}

jobs:
  validate:
    if: >-
      github.actor == 'marsgotta' &&
      github.event.pull_request.user.login == 'marsgotta' &&
      github.event.pull_request.base.ref == 'main' &&
      github.repository == 'kimen-dev/kimen' &&
      contains(github.event.pull_request.labels.*.name, 'break-glass')
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
      pull-requests: read
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2
        with:
          egress-policy: block
          allowed-endpoints: >-
            github.com:443
            api.github.com:443
            objects.githubusercontent.com:443

      # pull_request_target executes the trusted base workflow. Pin checkout to
      # the trusted base SHA and never fetch or execute the PR head.
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          ref: ${{ github.event.pull_request.base.sha }}
          persist-credentials: false

      - name: Validate founder PR-only break-glass evidence
        env:
          KIMEN_BREAK_GLASS_LABEL: break-glass
          KIMEN_FOUNDER_LOGIN: marsgotta
        run: node .github/scripts/review-evidence.cjs validate-break-glass-event
