schema_version: "1.0"
workflow:
  id: "kimen"
  name: "Kimen Proportionate Delivery"
  version: "2.0.0"
  author: "Kimen"
  description: "Clarify → contract only when Article II requires it → implement with tests → consolidated quality → founder merge"

# This workflow is the optional structured path for public behavior, API,
# interaction or security-boundary changes. Routine fixes and maintenance use
# the same test and quality bar without manufacturing Spec Kit artifacts.

requires:
  speckit_version: ">=0.12.0"
  integrations:
    any:
      - "claude"

inputs:
  spec:
    type: string
    required: true
    prompt: "Describe the public behavior or boundary change"

steps:
  - id: specify
    command: speckit.specify
    input:
      args: "{{ inputs.spec }}"

  - id: clarify
    command: speckit.clarify
    input:
      args: "{{ inputs.spec }}"

  - id: extract-feature
    type: shell
    run: "bash scripts/gates/extract-feature.sh"

  - id: lint-contract
    type: shell
    run: "bash scripts/gates/check-spec-contracts.sh"

  - id: confirm-intent
    type: gate
    message: "Contrato de comportamiento listo. Confirma que refleja la intención antes de implementar."
    options: [approve, reject]
    on_reject: abort

  # Planning artifacts are intentionally absent from the default workflow.
  # Invoke speckit.plan/checklist/tasks manually only when complexity warrants it.
  - id: implement
    command: speckit.implement
    input:
      args: "{{ inputs.spec }}"

  - id: quality
    type: shell
    run: "bash scripts/gates/gates-suite.sh"

  - id: done
    type: shell
    run: "echo 'Quality green. Ready for the founder merge decision.'"
