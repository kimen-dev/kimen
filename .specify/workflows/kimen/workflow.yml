schema_version: "1.0"
workflow:
  id: "kimen"
  name: "Kimen Constitutional SDD Cycle"
  version: "0.1.0"
  author: "Kimen"
  description: "specify → clarify → canonical Gherkin extraction → synchronized contract validation → founder gate (marker v2 with both hashes) → plan → checklist → analyze → constitution check → tasks → implement/converge loop terminated by deterministic gates (onmars-spec)"

# NOTE: run locally (human gates cannot be approved headless). CI runs the
# same shell gates directly via .github/workflows/ci.yml.
# Failed shell gates halt the run; `specify workflow resume <run_id>` retries
# from the failed step after you fix the cause.

requires:
  speckit_version: ">=0.12.0"
  integrations:
    any:
      - "claude"

inputs:
  spec:
    type: string
    required: true
    prompt: "Describe the feature (it will flow through the constitutional pipeline)"

steps:
  - id: specify
    command: speckit.specify
    input:
      args: "{{ inputs.spec }}"

  - id: clarify
    command: speckit.clarify
    input:
      args: "{{ inputs.spec }}"

  # Deterministic extraction: the spec's ```gherkin block becomes
  # specs/<feature>/feature.feature (idempotent; fails if the block is missing)
  - id: extract-feature
    type: shell
    run: "bash scripts/gates/extract-feature.sh"

  # Deterministic read-only gate: spec block == feature bytes, Gherkin shape
  # and five-scenario-family coverage for UI components (Art. II).
  - id: lint-spec
    type: shell
    run: "bash scripts/gates/check-spec-contracts.sh"

  # HUMAN GATE 1 (constitution Workflow): spec + Gherkin approval by the founder
  - id: approve-spec
    type: gate
    message: "Spec y Gherkin listos y con lint verde. Aprobación constitucional del founder (gate humana 1 de 2)."
    options: [approve, reject]
    on_reject: abort

  # Persist human gate 1 as marker v2: UTC date + exact spec.md and
  # feature.feature SHA-256. Both before_plan and before_implement refuse stale
  # or desynchronized pairs.
  # NOTE: in direct-skill mode (no workflow runner), founder approval == the
  # founder running `bash scripts/gates/record-approval.sh` after approving.
  - id: record-approval
    type: shell
    run: "bash scripts/gates/record-approval.sh"

  - id: plan
    command: speckit.plan
    input:
      args: "{{ inputs.spec }}"

  - id: checklist
    command: speckit.checklist
    input:
      args: "{{ inputs.spec }}"

  - id: analyze
    command: speckit.analyze
    input:
      args: "{{ inputs.spec }}"

  # Deterministic gate: governance consistency before any implementation
  - id: constitution-check
    type: shell
    run: "bash scripts/gates/constitution-check.sh"

  - id: tasks
    command: speckit.tasks
    input:
      args: "{{ inputs.spec }}"

  # onmars-spec loop: implement → converge → deterministic suite, until green.
  # max_iterations is the stuck-threshold; exhausting it escalates to the founder.
  - id: implement-loop
    type: do-while
    condition: "{{ steps.gates-recheck.output.exit_code != 0 }}"
    max_iterations: 3
    steps:
      - id: implement-round
        command: speckit.implement
        input:
          args: "{{ inputs.spec }}"
      - id: converge-round
        command: speckit.converge
        input:
          args: "{{ inputs.spec }}"
      - id: gates-recheck
        type: shell
        run: "bash scripts/gates/gates-suite.sh"
        continue_on_error: true

  - id: escalation-check
    type: if
    condition: "{{ steps.gates-recheck.output.exit_code != 0 }}"
    then:
      # Stuck-threshold exhausted: halt with a failed step so the run surfaces
      # as failed for founder escalation (onmars-spec contract).
      - id: escalate-to-founder
        type: shell
        run: "echo 'ESCALATION: deterministic gates still red after loop budget (onmars-spec stuck-threshold). Founder review required.' && exit 1"
    else:
      # Traceability now runs INSIDE gates-suite.sh (so it already gated every
      # gates-recheck above and CI); the former duplicate final call was
      # dropped — one gate, one owner (Art. X determinism).
      - id: done
        type: shell
        run: "echo 'All gates green (traceability enforced inside the suite). Ready for clean-context review and the merge gate (human gate 2).'"
